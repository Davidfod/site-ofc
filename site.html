<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Enviar para Discord</title>
</head>
<body>
  <h1>Formulário de envio</h1>
  <form id="dadosForm">
    <label>Nome: <input type="text" id="nome"></label><br><br>
    <label>Cidade: <input type="text" id="cidade"></label><br><br>
    <button type="submit">Enviar</button>
  </form>

  <script>
    const webhookURL = "https://discord.com/api/webhooks/https://discord.com/api/webhooks/1519484333717459095/VPDh0-rxLraKrrjjEuSGSfGIi9Bb7L_GPeo7wN3q6tnmv0ODz4hjzuLBETkrHenM5Ra-";

    document.getElementById("dadosForm").addEventListener("submit", function(e){
      e.preventDefault();
      const nome = document.getElementById("nome").value;
      const cidade = document.getElementById("cidade").value;

      const mensagem = {
        content: `Novo envio:\nNome: ${nome}\nCidade: ${cidade}`
      };

      fetch(webhookURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(mensagem)
      })
      .then(() => alert("Enviado para o Discord!"))
      .catch(err => alert("Erro: " + err));
    });
  </script>
</body>
</html>
