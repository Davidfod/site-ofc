<script>
/* ====== CONFIGURAÇÕES ====== */
const config = {
  apiKey: "AIzaSyDegW2sEjWvx3Ih7U6vs45Gp8PeXyfJ90w",
  authDomain: "cyber-a41d9.firebaseapp.com",
  projectId: "cyber-a41d9",
  storageBucket: "cyber-a41d9.appspot.com",
  messagingSenderId: "563443982918",
  appId: "1:563443982918:web:61cf4b88f1b4ddd89ee047",
  databaseURL: "https://cyber-a41d9-default-rtdb.firebaseio.com/"
};

document.addEventListener("DOMContentLoaded", () => {
  const ipValueEl   = document.getElementById("ip-value");
  const regionValueEl = document.getElementById("region-value");
  const timeValueEl  = document.getElementById("time-value");
  const mainCardEl   = document.getElementById("main-card");
  const loadingEl    = document.getElementById("loading");
  const emptyMsgEl   = document.getElementById("empty-msg");
  const listEl       = document.getElementById("list");

  /* ====== INICIALIZAR FIREBASE ====== */
  const firebaseSnap = document.createElement("script");
  firebaseSnap.src  = "https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js";
  const dataSnap    = document.createElement("script");
  dataSnap.src      = "https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js";
  document.head.append(firebaseSnap, dataSnap);

  setTimeout(() => {
    firebase.initializeApp(config);
    const db = firebase.database();

    /* ====== PEGAR IP & REGIÃO ====== */
    fetch("https://geolocation-db.com/json/")
      .then(r => r.json())
      .then(result => {
        const data = {
          ip:        result.IPv4,
          country:   (result.country_name || '') + (result.city ? `, ${result.city}` : ''),
          timestamp: new Date().toISOString()
        };
        ipValueEl.textContent   = data.ip;
        regionValueEl.textContent = data.country;
        timeValueEl.textContent  = `Atualizado: ${new Date(data.timestamp).toLocaleString('pt-BR')}`;
        mainCardEl.style.display = "block";
        loadingEl.style.display = "none";

        /* Salvar no Firebase */
        db.ref("ip_list").push(data);

      })
      .catch(() => {
        ipValueEl.textContent   = "Indisponível";
        regionValueEl.textContent = "Offline";
        timeValueEl.textContent  = "Verifique conexão";
        mainCardEl.style.display = "block";
        loadingEl.style.display = "none";
        db.ref("ip_list").push({ip:"offline", region:"offline", time:new Date().toISOString()});
      });

    /* ====== OUVIR ATUALIZAÇÕES ====== */
    db.ref("ip_list").orderByChild("timestamp").limitToLast(50).on("value", snap => {
      const ips = [];
      snap.forEach(child => ips.push(child.val()));
      ips.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

      listEl.innerHTML = "";
      ips.forEach(item => {
        const c = document.createElement("div");
        c.className = "card";
        c.innerHTML = `
          <div class="ip">IP: <span>${item.ip || '?:'}</span></div>
          <div class="region">Região: <span>${item.country || 'Offline'}</span></div>
          <div class="time">${new Date(item.timestamp).toLocaleString('pt-BR')}</div>
        `;
        listEl.appendChild(c);
      });
      if (ips.length === 0) emptyMsgEl.style.display = "block";
    });

    /* ====== SISTEMA DE KEY ====== */
    const keyBox = document.createElement("div");
    keyBox.style.position = "fixed";
    keyBox.style.bottom = "10px";
    keyBox.style.right = "10px";
    keyBox.style.background = "#111";
    keyBox.style.padding = "10px";
    keyBox.style.borderRadius = "8px";
    keyBox.innerHTML = `
      <input type="password" id="key-input" placeholder="Digite a key" style="padding:5px;border:none;border-radius:5px;">
      <button id="check-key" style="padding:5px 10px;margin-left:5px;">OK</button>
      <button id="clear-btn" style="padding:5px 10px;margin-left:5px;display:none;background:#ff4b4b;color:#fff;border:none;border-radius:5px;">
        Limpar Dados
      </button>
    `;
    document.body.appendChild(keyBox);

    const keyInput = document.getElementById("key-input");
    const checkKeyBtn = document.getElementById("check-key");
    const clearBtn = document.getElementById("clear-btn");

    checkKeyBtn.addEventListener("click", () => {
      if (keyInput.value === "cyberlindo") {
        clearBtn.style.display = "inline-block";
        alert("Key aceita! Você pode limpar os dados.");
      } else {
        alert("Key incorreta!");
      }
    });

    clearBtn.addEventListener("click", () => {
      if (keyInput.value === "cyberlindo") {
        db.ref("ip_list").remove()
          .then(() => {
            alert("Todos os dados foram limpos!");
            listEl.innerHTML = "";
            mainCardEl.style.display = "none";
            emptyMsgEl.style.display = "block";

            // Mensagem de log visível para todos
            db.ref("ip_list").push({
              ip: "⚠️ Dados resetados pelo admin",
              country: "Sistema",
              timestamp: new Date().toISOString()
            });
          })
          .catch(err => alert("Erro ao limpar: " + err));
      }
    });
  }, 200); // tempo reduzido para carregar mais rápido
});
</script>
