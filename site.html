<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Ofc</title>
  <style>
    body{background:#0a1226;font-family:'Roboto',sans-serif;color:#fff;min-height:100vh;}
    .container{width:min(95%,600px);margin:auto;padding:30px;}
    h1{text-align:center;font-size:1.5em;margin-bottom:10px;text-shadow:0 0 8px #00f5ff;}
    .subtitle{text-align:center;color:#a8a8a8;margin-bottom:25px;}
    .card{background:rgba(10,25,50,0.8);border:1px solid #2a3853;border-radius:10px;padding:20px;margin:15px 0;}
    .ip, .region, .time{margin:8px 0;}
    .loader{border:4px solid rgba(0,0,0,0.1);border-top-color:#00f5ff;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:10px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .key-box{position:fixed;bottom:10px;right:10px;background:#111;padding:10px;border-radius:8px;}
    .key-box input{padding:5px;border:none;border-radius:5px;}
    .key-box button{padding:5px 10px;margin-left:5px;border:none;border-radius:5px;}
    #clear-btn{background:#ff4b4b;color:#fff;display:none;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Site Ofc</h1>
    <p class="subtitle">Aguarde, sistema processando...</p>

    <div id="loading" style="text-align:center;">
      <p>Sistema processando&hellip;</p>
      <div class="loader"></div>
    </div>

    <div id="main-card" class="card" style="display:none;">
      <div class="ip"><strong>IP:</strong> <span id="ip-value"></span></div>
      <div class="region"><strong>Localização:</strong> <span id="region-value"></span></div>
      <div class="time" id="time-value"></div>
    </div>

    <div id="list" style="margin-top:30px;"></div>
  </div>

  <div class="key-box">
    <input type="password" id="key-input" placeholder="Digite a key">
    <button id="check-key">OK</button>
    <button id="clear-btn">Limpar Dados</button>
  </div>

<script>
const config = {
  apiKey: "AIzaSyDegW2sEjWvx3Ih7U6vs45Gp8PeXyfJ90w",
  authDomain: "cyber-a41d9.firebaseapp.com",
  projectId: "cyber-a41d9",
  storageBucket: "cyber-a41d9.appspot.com",
  messagingSenderId: "563443982918",
  appId: "1:563443982918:web:61cf4b88f1b4ddd89ee047",
  databaseURL: "https://cyber-a41d9-default-rtdb.firebaseio.com/"
};

document.addEventListener("DOMContentLoaded", () => {
  const ipValueEl   = document.getElementById("ip-value");
  const regionValueEl = document.getElementById("region-value");
  const timeValueEl  = document.getElementById("time-value");
  const mainCardEl   = document.getElementById("main-card");
  const loadingEl    = document.getElementById("loading");
  const listEl       = document.getElementById("list");

  const keyInput = document.getElementById("key-input");
  const checkKeyBtn = document.getElementById("check-key");
  const clearBtn = document.getElementById("clear-btn");

  const firebaseSnap = document.createElement("script");
  firebaseSnap.src  = "https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js";
  const dataSnap    = document.createElement("script");
  dataSnap.src      = "https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js";
  document.head.append(firebaseSnap, dataSnap);

  setTimeout(() => {
    firebase.initializeApp(config);
    const db = firebase.database();

    // Pega IP e localização detalhada via HTTPS
    fetch("https://ipapi.co/json/")
      .then(r => r.json())
      .then(result => {
        const data = {
          ip: result.ip,
          country: `${result.country_name}, ${result.region}, ${result.city}`,
          timestamp: new Date().toISOString()
        };
        ipValueEl.textContent   = data.ip;
        regionValueEl.textContent = data.country;
        timeValueEl.textContent  = `Atualizado: ${new Date(data.timestamp).toLocaleString('pt-BR')}`;
        mainCardEl.style.display = "block";
        loadingEl.style.display = "none";

        db.ref("ip_list").push(data);
      })
      .catch(() => {
        ipValueEl.textContent   = "Indisponível";
        regionValueEl.textContent = "Offline";
        timeValueEl.textContent  = "Verifique conexão";
        mainCardEl.style.display = "block";
        loadingEl.style.display = "none";
      });

    // Listener em tempo real
    db.ref("ip_list").orderByChild("timestamp").limitToLast(50).on("value", snap => {
      const ips = [];
      snap.forEach(child => ips.push(child.val()));
      ips.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

      listEl.innerHTML = "";
      ips.forEach(item => {
        const c = document.createElement("div");
        c.className = "card";
        c.innerHTML = `
          <div class="ip">IP: <span>${item.ip || '?:'}</span></div>
          <div class="region">Localização: <span>${item.country || 'Offline'}</span></div>
          <div class="time">${new Date(item.timestamp).toLocaleString('pt-BR')}</div>
        `;
        listEl.appendChild(c);
      });
    });

    // Sistema de key
    checkKeyBtn.addEventListener("click", () => {
      if (keyInput.value === "cyberlindo") {
        clearBtn.style.display = "inline-block";
        alert("Key aceita! Você pode limpar os dados.");
      } else {
        alert("Key incorreta!");
      }
    });

    clearBtn.addEventListener("click", () => {
      if (keyInput.value === "cyberlindo") {
        db.ref("ip_list").set({}); // limpa mas mantém o nó
        db.ref("ip_list").push({
          ip: "⚠️ Dados resetados pelo admin",
          country: "Sistema",
          timestamp: new Date().toISOString()
        });
      }
    });
  }, 200);
});
</script>
</body>
</html>
